<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenRouter API Tester</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0ff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: #1a1a2e;
      border-radius: 16px;
      border: 1px solid #3a3a6a;
      padding: 32px;
      max-width: 720px;
      width: 100%;
      box-shadow: 0 0 40px rgba(100, 80, 255, 0.15);
    }

    h1 {
      font-size: 1.5rem;
      color: #a78bfa;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 0.82rem;
      color: #888;
      margin-bottom: 24px;
    }

    label {
      font-size: 0.82rem;
      color: #aaa;
      margin-bottom: 5px;
      display: block;
    }

    input[type="text"],
    textarea {
      width: 100%;
      padding: 11px 14px;
      background: #0f0f1a;
      border: 1px solid #3a3a6a;
      border-radius: 10px;
      color: #e0e0ff;
      font-size: 0.92rem;
      font-family: 'Segoe UI', sans-serif;
      outline: none;
      transition: border 0.2s;
      margin-bottom: 14px;
    }

    input[type="text"]:focus,
    textarea:focus {
      border-color: #7c3aed;
    }

    textarea {
      resize: vertical;
      min-height: 110px;
    }

    button {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover {
      opacity: 0.85;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .result {
      margin-top: 22px;
      padding: 16px;
      background: #0f0f1a;
      border-radius: 10px;
      border-left: 4px solid #7c3aed;
      display: none;
    }

    .result.visible {
      display: block;
    }

    .result.ok {
      border-left-color: #10b981;
    }

    .result.error {
      border-left-color: #ef4444;
    }

    .result-label {
      font-size: 0.72rem;
      color: #888;
      margin-bottom: 8px;
    }

    .result-text {
      font-size: 0.93rem;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.73rem;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .badge-ok {
      background: #064e3b;
      color: #10b981;
    }

    .badge-err {
      background: #450a0a;
      color: #ef4444;
    }

    .latency {
      font-size: 0.72rem;
      color: #6b7280;
      margin-top: 10px;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>🔮 OpenRouter API Tester</h1>
    <p class="subtitle">Test cloud LLM via OpenRouter — verify key + model before running benchmarks.</p>

    <label for="apiKey">API Key</label>
    <input type="text" id="apiKey" value="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" />

    <label for="model">Model</label>
    <input type="text" id="model" value="deepseek/deepseek-v3:free" />

    <label for="prompt">Prompt</label>
    <textarea id="prompt">Say hello in one sentence.</textarea>

    <button id="sendBtn" onclick="testAPI()">Send Request</button>

    <div class="result" id="result">
      <div class="result-label">Response</div>
      <div id="statusBadge"></div>
      <div class="result-text" id="resultText"></div>
      <div class="latency" id="latencyText"></div>
    </div>
  </div>

  <script>
    async function testAPI() {
      const apiKey = document.getElementById('apiKey').value.trim();
      const model = document.getElementById('model').value.trim();
      const prompt = document.getElementById('prompt').value.trim();
      const btn = document.getElementById('sendBtn');
      const resultDiv = document.getElementById('result');
      const resultText = document.getElementById('resultText');
      const statusBadge = document.getElementById('statusBadge');
      const latencyText = document.getElementById('latencyText');

      if (!apiKey || !prompt || !model) {
        alert('Please fill in all fields.');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Calling ' + model + '...';
      resultDiv.className = 'result visible';
      resultText.textContent = 'Waiting for response...';
      statusBadge.innerHTML = '';
      latencyText.textContent = '';

      const startTime = performance.now();
      try {
        const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${apiKey}`,
            'Content-Type': 'application/json',
            'HTTP-Referer': 'http://localhost',
            'X-Title': 'LLM Benchmark Tester'
          },
          body: JSON.stringify({
            model: model,
            messages: [{ role: 'user', content: prompt }],
            temperature: 0.0
          })
        });

        const latency = (performance.now() - startTime).toFixed(0);
        const data = await response.json();

        if (response.ok) {
          const text = data.choices?.[0]?.message?.content || '(No content)';
          resultDiv.className = 'result visible ok';
          statusBadge.innerHTML = `<span class="status-badge badge-ok">✅ SUCCESS — ${model} is WORKING</span>`;
          resultText.textContent = text.trim();
          latencyText.textContent = `⏱ Latency: ${latency}ms`;
        } else {
          resultDiv.className = 'result visible error';
          const errMsg = data.error?.message || JSON.stringify(data, null, 2);
          statusBadge.innerHTML = `<span class="status-badge badge-err">❌ ERROR ${response.status}</span>`;
          resultText.textContent = errMsg;
          latencyText.textContent = `⏱ Latency: ${latency}ms`;
        }
      } catch (e) {
        resultDiv.className = 'result visible error';
        statusBadge.innerHTML = '<span class="status-badge badge-err">❌ NETWORK ERROR</span>';
        resultText.textContent = e.message;
      }

      btn.disabled = false;
      btn.textContent = 'Send Request';
    }
  </script>
</body>

</html>
