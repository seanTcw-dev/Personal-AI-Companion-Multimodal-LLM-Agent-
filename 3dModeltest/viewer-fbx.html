<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VRM Model with FBX Animation</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0E101B 0%, #1a1f35 100%);
      color: #E8EDFF;
      overflow: hidden;
      height: 100vh;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(14, 16, 27, 0.95);
      color: #00F6FF;
      font-size: 1.5rem;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .loading-overlay.hidden {
      display: none;
    }

    .loading-text {
      background: rgba(0, 0, 0, 0.7);
      padding: 30px 50px;
      border: 2px solid #00F6FF;
      box-shadow: 0 0 30px rgba(0, 246, 255, 0.6);
      text-transform: uppercase;
      letter-spacing: 3px;
      animation: pulse 2s infinite;
      margin-bottom: 20px;
    }

    .loading-status {
      font-size: 0.9rem;
      color: #9FADC6;
      margin-top: 10px;
    }

    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 0 20px rgba(0, 246, 255, 0.4);
      }

      50% {
        box-shadow: 0 0 40px rgba(0, 246, 255, 0.8);
      }
    }

    .controls {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(14, 16, 27, 0.9);
      border: 1px solid rgba(0, 246, 255, 0.3);
      padding: 20px;
      border-radius: 8px;
      z-index: 10;
      min-width: 280px;
      box-shadow: 0 0 20px rgba(0, 246, 255, 0.3);
    }

    .controls h3 {
      margin: 0 0 15px 0;
      color: #00F6FF;
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid rgba(0, 246, 255, 0.3);
      padding-bottom: 10px;
    }

    .control-group {
      margin-bottom: 15px;
    }

    .control-group label {
      display: block;
      color: #9FADC6;
      font-size: 0.85rem;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .control-group select,
    .control-group input[type="range"] {
      width: 100%;
      padding: 8px;
      background: rgba(10, 12, 22, 0.8);
      border: 1px solid rgba(0, 246, 255, 0.3);
      color: #00F6FF;
      border-radius: 4px;
      font-size: 0.9rem;
    }

    .control-group input[type="range"] {
      padding: 0;
      height: 6px;
      cursor: pointer;
    }

    .value-display {
      text-align: center;
      color: #00F6FF;
      font-size: 0.9rem;
      margin-top: 5px;
      font-weight: 600;
    }

    button {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #00F6FF, #7B2DFF);
      border: none;
      color: white;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 5px;
      border-radius: 4px;
    }

    button:hover {
      box-shadow: 0 0 20px rgba(0, 246, 255, 0.6);
      transform: translateY(-2px);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .animation-status {
      background: rgba(0, 246, 255, 0.1);
      border: 1px solid rgba(0, 246, 255, 0.3);
      padding: 10px;
      border-radius: 4px;
      margin-top: 10px;
      font-size: 0.85rem;
      text-align: center;
    }

    .animation-status.playing {
      background: rgba(76, 175, 80, 0.2);
      border-color: rgba(76, 175, 80, 0.5);
      color: #4caf50;
    }

    .info {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(14, 16, 27, 0.9);
      border: 1px solid rgba(0, 246, 255, 0.3);
      padding: 15px;
      border-radius: 8px;
      font-size: 0.85rem;
      color: #9FADC6;
      max-width: 350px;
    }

    .info strong {
      color: #00F6FF;
    }

    .info ul {
      margin: 5px 0 0 20px;
    }
  </style>
</head>

<body>
  <div id="canvas-container">
    <canvas id="canvas3d"></canvas>
  </div>

  <div id="loading" class="loading-overlay">
    <div class="loading-text">LOADING VRM + FBX...</div>
    <div class="loading-status" id="loadingStatus">Initializing...</div>
  </div>

  <div class="controls">
    <h3>🎬 Animation Controls</h3>

    <div class="control-group">
      <label>Animation:</label>
      <select id="animationSelect">
        <option value="">No Animation</option>
        <option value="waving">Waving Animation (FBX)</option>
        <option value="idle">Standing Idle (FBX)</option>
        <option value="idle2">Idle 2 (FBX)</option>
      </select>
    </div>

    <div class="control-group">
      <label>Animation Speed:</label>
      <input type="range" id="speedSlider" min="0.1" max="2" step="0.1" value="1">
      <div class="value-display" id="speedValue">1.0x</div>
    </div>

    <button onclick="toggleAnimation()">Play / Pause</button>
    <button onclick="restartAnimation()">Restart Animation</button>

    <div id="animStatus" class="animation-status">No animation loaded</div>

    <h3 style="margin-top: 20px;">😊 Expressions</h3>

    <div class="control-group">
      <label>Expression:</label>
      <select id="expressionSelect">
        <option value="">Select Expression...</option>
        <option value="neutral">Neutral</option>
        <option value="happy">Happy</option>
        <option value="sad">Sad</option>
        <option value="angry">Angry</option>
        <option value="surprised">Surprised</option>
      </select>
    </div>

    <div class="control-group">
      <label>Intensity:</label>
      <input type="range" id="expressionSlider" min="0" max="1" step="0.01" value="1" disabled>
      <div class="value-display" id="expressionValue">1.00</div>
    </div>
  </div>

  <div class="info">
    <strong>🎮 Controls:</strong>
    <ul>
      <li>Mouse drag to rotate</li>
      <li>Scroll to zoom</li>
      <li>Select animation to play FBX</li>
      <li>Adjust speed in real-time</li>
      <li>Combine with expressions!</li>
    </ul>
  </div>

  <!-- Import Three.js, VRM, and FBX Loader -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
        "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.1.0/lib/three-vrm.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
    import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, clock, controls;
    let vrm = null;
    let mixer = null;
    let currentAction = null;
    let fbxAnimation = null;

    const loadingStatus = document.getElementById('loadingStatus');

    // Initialize Three.js scene
    function init() {
      const canvas = document.getElementById('canvas3d');
      const container = document.getElementById('canvas-container');

      // Create scene
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0E101B);

      // Create camera
      camera = new THREE.PerspectiveCamera(
        30,
        container.clientWidth / container.clientHeight,
        0.1,
        20
      );
      camera.position.set(0, 3.0, 6.5);
      camera.lookAt(0, 1.2, 0);

      // Create renderer
      renderer = new THREE.WebGLRenderer({
        canvas,
        antialias: true
      });
      renderer.setSize(container.clientWidth, container.clientHeight);
      renderer.setPixelRatio(window.devicePixelRatio);

      // Add OrbitControls
      controls = new OrbitControls(camera, renderer.domElement);
      controls.target.set(0, 1.2, 0);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.minDistance = 2;
      controls.maxDistance = 10;

      // Three-point lighting
      const keyLight = new THREE.DirectionalLight(0xffffff, 1.5);
      keyLight.position.set(1, 1.5, 2);
      scene.add(keyLight);

      const fillLight = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(fillLight);

      const rimLight = new THREE.DirectionalLight(0x88aaff, 0.6);
      rimLight.position.set(-0.5, 1.5, -1.5);
      scene.add(rimLight);

      const frontLight = new THREE.DirectionalLight(0xffffff, 0.8);
      frontLight.position.set(0, 1.2, 3);
      scene.add(frontLight);

      // Create clock
      clock = new THREE.Clock();

      // Load VRM model first
      loadVRMModel();

      // Handle window resize
      window.addEventListener('resize', onWindowResize);

      // Start animation loop
      animate();
    }

    // Load VRM model
    function loadVRMModel() {
      loadingStatus.textContent = '📥 Loading VRM model...';

      const loader = new GLTFLoader();
      loader.register((parser) => new VRMLoaderPlugin(parser));

      console.log('🔍 Loading VRM model from: avatar.vrm');

      loader.load(
        'avatar.vrm',
        (gltf) => {
          vrm = gltf.userData.vrm;

          if (!vrm) {
            console.error('❌ VRM model not found in GLTF');
            document.getElementById('loading').classList.add('hidden');
            return;
          }

          console.log('✅ VRM model loaded successfully:', vrm);

          // Create wrapper group
          const characterWrapper = new THREE.Group();
          characterWrapper.name = 'characterWrapper';
          characterWrapper.add(vrm.scene);
          scene.add(characterWrapper);

          // Apply transformations
          characterWrapper.scale.set(2.1, 2.1, 2.1);
          characterWrapper.position.y = -0.6;

          console.log('📦 Character wrapper - Scale:', characterWrapper.scale.x, 'Position Y:', characterWrapper.position.y);

          // Create animation mixer for the VRM
          mixer = new THREE.AnimationMixer(vrm.scene);

          // Rotate VRM to face camera
          VRMUtils.rotateVRM0(vrm);

          // Fix T-pose
          if (vrm.humanoid) {
            const leftUpperArm = vrm.humanoid.getRawBoneNode('leftUpperArm');
            const rightUpperArm = vrm.humanoid.getRawBoneNode('rightUpperArm');
            const leftLowerArm = vrm.humanoid.getRawBoneNode('leftLowerArm');
            const rightLowerArm = vrm.humanoid.getRawBoneNode('rightLowerArm');

            if (leftUpperArm) leftUpperArm.rotation.z = 0.8;
            if (rightUpperArm) rightUpperArm.rotation.z = -0.8;
            if (leftLowerArm) leftLowerArm.rotation.z = 0.3;
            if (rightLowerArm) rightLowerArm.rotation.z = -0.3;

            console.log('🦾 Arms relaxed from T-pose');
          }

          // Set default expression
          setExpression('neutral', 1.0);

          console.log('✅ VRM ready! Now loading FBX animation...');

          // Now load FBX animation
          loadFBXAnimation();
        },
        (progress) => {
          const percent = (progress.loaded / progress.total) * 100;
          loadingStatus.textContent = `📥 Loading VRM: ${percent.toFixed(1)}%`;
          console.log(`📥 VRM Loading: ${percent.toFixed(1)}%`);
        },
        (error) => {
          console.error('❌ Error loading VRM:', error);
          document.getElementById('loading').classList.add('hidden');
          alert('Failed to load VRM model.');
        }
      );
    }

    // Load FBX animation
    function loadFBXAnimation() {
      loadingStatus.textContent = '🎬 Loading FBX animations...';

      const fbxLoader = new FBXLoader();

      // Load waving animation
      console.log('🔍 Loading waving animation from: AvatarSample_A@Waving.fbx');

      fbxLoader.load(
        'AvatarSample_A@Waving.fbx',
        (fbx) => {
          console.log('✅ Waving FBX loaded successfully:', fbx);

          // Extract animations from FBX
          if (fbx.animations && fbx.animations.length > 0) {
            fbxAnimation = fbx.animations[0];
            fbxAnimation.name = 'waving';
            console.log('🎬 Waving animation found:', fbxAnimation.name, 'Duration:', fbxAnimation.duration);

            // Now load idle animation
            loadIdleAnimation();
          } else {
            console.warn('⚠️ No animations found in waving FBX file');
            loadIdleAnimation();
          }
        },
        (progress) => {
          const percent = (progress.loaded / progress.total) * 100;
          loadingStatus.textContent = `🎬 Loading Waving FBX: ${percent.toFixed(1)}%`;
          console.log(`📥 Waving FBX Loading: ${percent.toFixed(1)}%`);
        },
        (error) => {
          console.error('❌ Error loading waving FBX:', error);
          loadIdleAnimation();
        }
      );
    }

    // Store idle animation separately
    let idleAnimation = null;
    let idle2Animation = null;

    // Load idle animation
    function loadIdleAnimation() {
      const fbxLoader = new FBXLoader();

      console.log('🔍 Loading idle animation from: idle.fbx');

      fbxLoader.load(
        'idle.fbx',
        (fbx) => {
          console.log('✅ Idle FBX loaded successfully:', fbx);

          if (fbx.animations && fbx.animations.length > 0) {
            idleAnimation = fbx.animations[0];
            idleAnimation.name = 'idle';
            console.log('🎬 Idle animation found:', idleAnimation.name, 'Duration:', idleAnimation.duration);

            // Now load idle2 animation
            loadIdle2Animation();
          } else {
            console.warn('⚠️ No animations found in idle FBX file');
            loadIdle2Animation();
          }
        },
        (progress) => {
          const percent = (progress.loaded / progress.total) * 100;
          loadingStatus.textContent = `🎬 Loading Idle FBX: ${percent.toFixed(1)}%`;
          console.log(`📥 Idle FBX Loading: ${percent.toFixed(1)}%`);
        },
        (error) => {
          console.error('❌ Error loading idle FBX:', error);
          finishLoading();
        }
      );
    }

    // Load idle2 animation
    function loadIdle2Animation() {
      const fbxLoader = new FBXLoader();

      console.log('🔍 Loading idle2 animation from: idle2.fbx');

      fbxLoader.load(
        'idle2.fbx',
        (fbx) => {
          console.log('✅ Idle2 FBX loaded successfully:', fbx);

          if (fbx.animations && fbx.animations.length > 0) {
            idle2Animation = fbx.animations[0];
            idle2Animation.name = 'idle2';
            console.log('🎬 Idle2 animation found:', idle2Animation.name, 'Duration:', idle2Animation.duration);

            loadingStatus.textContent = '✅ All animations loaded!';
            document.getElementById('animStatus').textContent = `Animations ready: waving, idle, idle2`;

            setTimeout(() => {
              document.getElementById('loading').classList.add('hidden');
            }, 500);
          } else {
            console.warn('⚠️ No animations found in idle2 FBX file');
            finishLoading();
          }
        },
        (progress) => {
          const percent = (progress.loaded / progress.total) * 100;
          loadingStatus.textContent = `🎬 Loading Idle2 FBX: ${percent.toFixed(1)}%`;
          console.log(`📥 Idle2 FBX Loading: ${percent.toFixed(1)}%`);
        },
        (error) => {
          console.error('❌ Error loading idle2 FBX:', error);
          finishLoading();
        }
      );
    }

    function finishLoading() {
      loadingStatus.textContent = '✅ Loading complete!';
      setTimeout(() => {
        document.getElementById('loading').classList.add('hidden');
      }, 1000);
    }

    // Play animation
    function playAnimation(animName) {
      if (!mixer) {
        console.warn('⚠️ Mixer not ready');
        return;
      }

      // Stop current animation
      if (currentAction) {
        currentAction.stop();
      }

      if (animName === 'waving' && fbxAnimation) {
        currentAction = mixer.clipAction(fbxAnimation);
        currentAction.setLoop(THREE.LoopRepeat);
        currentAction.play();

        document.getElementById('animStatus').textContent = `Playing: waving`;
        document.getElementById('animStatus').classList.add('playing');

        console.log('▶️ Playing animation: waving');
      } else if (animName === 'idle' && idleAnimation) {
        currentAction = mixer.clipAction(idleAnimation);
        currentAction.setLoop(THREE.LoopRepeat);
        currentAction.play();

        document.getElementById('animStatus').textContent = `Playing: idle`;
        document.getElementById('animStatus').classList.add('playing');

        console.log('▶️ Playing animation: idle');
      } else if (animName === 'idle2' && idle2Animation) {
        currentAction = mixer.clipAction(idle2Animation);
        currentAction.setLoop(THREE.LoopRepeat);
        currentAction.play();

        document.getElementById('animStatus').textContent = `Playing: idle2`;
        document.getElementById('animStatus').classList.add('playing');

        console.log('▶️ Playing animation: idle2');
      }
    }

    // Set expression
    function setExpression(name, weight = 1.0) {
      if (!vrm || !vrm.expressionManager) {
        console.warn('⚠️ Expression manager not available');
        return;
      }

      try {
        const expressions = ['happy', 'sad', 'angry', 'surprised', 'neutral'];
        expressions.forEach(exp => {
          try {
            vrm.expressionManager.setValue(exp, 0);
          } catch (e) { }
        });

        vrm.expressionManager.setValue(name, weight);
        console.log(`😊 Expression set: ${name} = ${weight.toFixed(2)}`);
      } catch (error) {
        console.warn(`⚠️ Failed to set expression '${name}':`, error);
      }
    }

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();

      // Update controls
      controls.update();

      // Update VRM
      if (vrm) {
        vrm.update(delta);
      }

      // Update mixer (for FBX animation)
      if (mixer) {
        mixer.update(delta);
      }

      renderer.render(scene, camera);
    }

    // Handle window resize
    function onWindowResize() {
      const container = document.getElementById('canvas-container');
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    }

    // UI Controls
    const animationSelect = document.getElementById('animationSelect');
    const speedSlider = document.getElementById('speedSlider');
    const speedValue = document.getElementById('speedValue');
    const expressionSelect = document.getElementById('expressionSelect');
    const expressionSlider = document.getElementById('expressionSlider');
    const expressionValue = document.getElementById('expressionValue');

    animationSelect.addEventListener('change', (e) => {
      if (e.target.value) {
        playAnimation(e.target.value);
      } else {
        if (currentAction) {
          currentAction.stop();
          currentAction = null;
          document.getElementById('animStatus').textContent = 'No animation playing';
          document.getElementById('animStatus').classList.remove('playing');
        }
      }
    });

    speedSlider.addEventListener('input', (e) => {
      const speed = parseFloat(e.target.value);
      speedValue.textContent = speed.toFixed(1) + 'x';

      if (mixer) {
        mixer.timeScale = speed;
        console.log('⚡ Animation speed:', speed);
      }
    });

    expressionSelect.addEventListener('change', (e) => {
      if (e.target.value) {
        expressionSlider.disabled = false;
        const weight = parseFloat(expressionSlider.value);
        setExpression(e.target.value, weight);
      } else {
        expressionSlider.disabled = true;
      }
    });

    expressionSlider.addEventListener('input', (e) => {
      const expression = expressionSelect.value;
      const weight = parseFloat(e.target.value);
      expressionValue.textContent = weight.toFixed(2);

      if (expression) {
        setExpression(expression, weight);
      }
    });

    window.toggleAnimation = function () {
      if (!currentAction) {
        console.warn('⚠️ No animation playing');
        return;
      }

      if (currentAction.paused) {
        currentAction.paused = false;
        console.log('▶️ Animation resumed');
      } else {
        currentAction.paused = true;
        console.log('⏸️ Animation paused');
      }
    };

    window.restartAnimation = function () {
      if (!currentAction) {
        console.warn('⚠️ No animation to restart');
        return;
      }

      currentAction.reset();
      currentAction.play();
      console.log('🔄 Animation restarted');
    };

    // Start the app
    init();
  </script>
</body>

</html>
