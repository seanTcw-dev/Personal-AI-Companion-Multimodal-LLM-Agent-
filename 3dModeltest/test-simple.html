<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Simple Mixamo Test</title>
    <style>
        body {
            margin: 0;
            background: #1a1a2e;
            color: #eee;
            font-family: monospace;
        }

        canvas {
            display: block;
        }

        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 5px;
        }

        button {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            border-radius: 3px;
        }
    </style>
</head>

<body>
    <div id="info">
        <h3>🧪 Simple Mixamo Test</h3>
        <div id="status">Loading...</div>
        <button id="testBtn" disabled>Play Idle (Direct)</button>
        <div id="log" style="margin-top: 10px; font-size: 11px; max-height: 200px; overflow-y: auto;"></div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/",
            "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.1.3/lib/three-vrm.module.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20);
        camera.position.set(0, 1.4, 2.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1, 0);
        controls.update();

        const light = new THREE.DirectionalLight(0xffffff, Math.PI);
        light.position.set(1, 1, 1);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        scene.add(new THREE.GridHelper(10, 10));

        let vrm = null;
        let mixer = null;
        const clock = new THREE.Clock();

        const statusEl = document.getElementById('status');
        const logEl = document.getElementById('log');
        const testBtn = document.getElementById('testBtn');

        function log(msg) {
            logEl.innerHTML += `<div>${msg}</div>`;
            logEl.scrollTop = logEl.scrollHeight;
            console.log(msg);
        }

        // Load VRM
        const loader = new GLTFLoader();
        loader.register((parser) => new VRMLoaderPlugin(parser));

        loader.load('avatar.vrm', (gltf) => {
            vrm = gltf.userData.vrm;
            VRMUtils.rotateVRM0(vrm);
            scene.add(vrm.scene);
            mixer = new THREE.AnimationMixer(vrm.scene);

            statusEl.textContent = '✅ VRM Ready';
            testBtn.disabled = false;

            log(`✅ VRM loaded`);
            log(`Humanoid bones: ${Object.keys(vrm.humanoid.humanBones).join(', ')}`);
        });

        // Test: Load FBX and apply DIRECTLY (no retargeting)
        testBtn.addEventListener('click', () => {
            logEl.innerHTML = '';
            log('🔄 Loading idle.fbx...');

            const fbxLoader = new FBXLoader();
            fbxLoader.load('idle.fbx', (fbx) => {
                log(`✅ FBX loaded`);
                log(`Animations: ${fbx.animations.length}`);

                if (fbx.animations.length > 0) {
                    const clip = fbx.animations[0];
                    log(`Clip: "${clip.name}", ${clip.duration.toFixed(2)}s, ${clip.tracks.length} tracks`);

                    // List some track names
                    const sampleTracks = clip.tracks.slice(0, 5).map(t => t.name);
                    log(`Sample tracks: ${sampleTracks.join(', ')}`);

                    // Try to play directly (will likely fail due to bone name mismatch)
                    try {
                        const action = mixer.clipAction(clip);
                        action.play();
                        log(`▶️ Playing animation (may not work due to bone mismatch)`);
                        statusEl.textContent = '▶️ Playing (direct)';
                    } catch (error) {
                        log(`❌ Error: ${error.message}`);
                    }
                }
            }, undefined, (error) => {
                log(`❌ Load error: ${error.message}`);
            });
        });

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);
            if (vrm) vrm.update(delta);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>

</html>
